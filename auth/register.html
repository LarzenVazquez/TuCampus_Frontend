<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuCampus - Registro</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/css/variables.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />

    <script
      src="https://kit.fontawesome.com/1f47fb468a.js"
      crossorigin="anonymous"
    ></script>

    <script type="module">
      import { initTheme, toggleTheme } from "/src/js/theme.js";
      window.toggleTheme = toggleTheme;
      initTheme();
    </script>
  </head>

  <body class="dark">
    <main class="auth-container">
      <section class="branding-section">
        <i
          class="fa-solid fa-user-plus"
          style="font-size: 80px; margin-bottom: 20px"
        ></i>
        <h1>Únete a TuCampus</h1>
        <p style="font-size: 20px; opacity: 0.9">
          Crea tu cuenta y empieza a gestionar tu vida universitaria.
        </p>
      </section>

      <section class="form-section">
        <div class="tc-card" style="max-width: 500px">
          <div style="margin-bottom: 24px">
            <h2 style="font-size: 28px; font-weight: 700; margin-bottom: 4px">
              Nueva Cuenta
            </h2>
            <p style="color: var(--text-secondary); font-size: 14px">
              Completa tus datos personales para registrarte
            </p>
          </div>

          <form id="register-form">
            <div class="tc-input-group">
              <label class="tc-label">
                <i class="fa-solid fa-user" style="margin-right: 8px"></i>
                Nombre completo
              </label>
              <input
                type="text"
                class="tc-input"
                placeholder="Ej. Juan Pérez"
                required
              />
            </div>

            <div class="tc-input-group">
              <label class="tc-label">
                <i class="fa-solid fa-envelope" style="margin-right: 8px"></i>
                Correo institucional
              </label>
              <input
                type="email"
                class="tc-input"
                placeholder="matricula@uteq.edu"
                required
              />
            </div>

            <div class="tc-input-group">
              <label class="tc-label">
                <i class="fa-solid fa-lock" style="margin-right: 8px"></i>
                Contraseña
              </label>
              <input
                type="password"
                id="password"
                class="tc-input"
                placeholder="Mínimo 8 caracteres"
                required
              />
            </div>

            <div class="tc-input-group">
              <label class="tc-label">
                <i class="fa-solid fa-lock" style="margin-right: 8px"></i>
                Verificar contraseña
              </label>
              <input
                type="password"
                id="confirm-password"
                class="tc-input"
                placeholder="Repite tu contraseña"
                required
              />
            </div>

            <button type="submit" class="tc-btn-main">
              Crear cuenta
              <i class="fa-solid fa-check" style="margin-left: 8px"></i>
            </button>
          </form>

          <div
            style="
              margin-top: 24px;
              text-align: center;
              font-size: 14px;
              color: var(--text-secondary);
            "
          >
            ¿Ya tienes cuenta?
            <a href="/index.html" class="tc-link">Inicia sesión</a>
          </div>

          <button
            type="button"
            class="tc-btn-theme"
            onclick="toggleTheme()"
            style="margin-top: 20px"
          >
            <i class="fa-solid fa-circle-half-stroke"></i> Cambiar modo
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
