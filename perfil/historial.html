<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuCampus - Historial</title>
    <script src="/src/js/guard.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/variables.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <script src="https://kit.fontawesome.com/1f47fb468a.js" crossorigin="anonymous"></script>
    
    <script type="module">
      import { initTheme, toggleTheme } from "/src/js/theme.js";
      window.toggleTheme = toggleTheme; // Exponemos la función al botón
      initTheme();
    </script>
  </head>

  <body class="dark">
    <header class="store-header" id="main-header"></header>

    <main class="tc-main-layout" style="padding-top: 20px; padding-bottom: 100px;">
      
      <div class="tc-card" style="max-width: 100%; margin-bottom: 24px; display: flex; align-items: center; gap: 20px;">
        <div class="user-avatar-circle" style="width: 60px; height: 60px; font-size: 24px; background: var(--accent); color: white;">
          AV
        </div>
        <div style="flex-grow: 1;">
          <h2 style="margin: 0; font-size: 22px;">Andrea Vasquez</h2>
          <p style="color: var(--text-secondary); margin: 4px 0;">andrea@uteq.edu.mx</p>
          <span class="status-pill" style="background: rgba(99, 102, 241, 0.1); color: var(--accent);">Vendedor Verificado</span>
        </div>
        
        <button class="tc-btn-theme" style="width: auto; padding: 10px 20px;" onclick="window.toggleTheme()">
          <i class="fa-solid fa-moon"></i> / <i class="fa-solid fa-sun"></i> Tema
        </button>
      </div>

      <h3 class="section-title" style="margin-bottom: 16px;">Historial de Pedidos</h3>

      <div class="tc-table-container">
        <table>
          <thead>
            <tr>
              <th>Orden</th>
              <th>Fecha</th>
              <th>Total</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>ORD-402</strong><br><span style="font-size: 12px; color: var(--text-secondary);">Cafetería</span></td>
              <td>04 Mar, 10:30 AM</td>
              <td style="font-weight: bold;">$105.00</td>
              <td><span class="status-pill status-success">ENTREGADA</span></td>
            </tr>
            <tr>
              <td><strong>ORD-399</strong><br><span style="font-size: 12px; color: var(--text-secondary);">Marketplace</span></td>
              <td>28 Feb, 12:15 PM</td>
              <td style="font-weight: bold;">$350.00</td>
              <td><span class="status-pill status-success">ENTREGADA</span></td>
            </tr>
            <tr>
              <td><strong>ORD-380</strong><br><span style="font-size: 12px; color: var(--text-secondary);">Cafetería</span></td>
              <td>24 Feb, 09:00 AM</td>
              <td style="font-weight: bold;">$45.00</td>
              <td><span class="status-pill status-success">ENTREGADA</span></td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
    <nav class="bottom-nav" id="main-nav"></nav>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
