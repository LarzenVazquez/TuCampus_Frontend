<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuCampus - Mi Carrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/variables.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <script src="https://kit.fontawesome.com/1f47fb468a.js" crossorigin="anonymous"></script>
    <script type="module">
      import { initTheme, toggleTheme } from "/src/js/theme.js";
      window.toggleTheme = toggleTheme;
      initTheme();
    </script>
  </head>

  <body class="dark">
    <header class="store-header" id="main-header"> 
        <button class="tc-btn-theme" onclick="window.toggleTheme()">
  Cambiar Tema 🌓
</button>
    </header>

    <main class="tc-main-layout" style="padding-top: 20px; padding-bottom: 100px;">
      
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
        <button class="add-btn-small" style="background: var(--elevated); color: var(--text-primary);" onclick="history.back()">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h2 class="section-title" style="margin: 0;">Mi Pedido</h2>
      </div>

      <div class="tc-table-container" style="margin-bottom: 24px;">
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Cant.</th>
              <th>Subtotal</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <strong>Café Capuccino</strong><br>
                <span style="font-size: 12px; color: var(--text-secondary);">12oz con canela</span>
              </td>
              <td>1</td>
              <td style="color: var(--accent); font-weight: bold;">$45.00</td>
            </tr>
            <tr>
              <td>
                <strong>Chilaquiles Verdes</strong><br>
                <span style="font-size: 12px; color: var(--text-secondary);">Extra crema</span>
              </td>
              <td>1</td>
              <td style="color: var(--accent); font-weight: bold;">$60.00</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="tc-input-group">
        <label class="tc-label">Instrucciones especiales para la cocina</label>
        <input type="text" class="tc-input" placeholder="Ej. Sin cebolla, extra servilletas..." />
      </div>

      <div class="tc-card" style="max-width: 100%; margin-top: 24px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 20px;">
          <strong>Total a pagar:</strong>
          <span style="color: var(--accent); font-weight: 900;">$105.00</span>
        </div>
        <button class="tc-btn-main">
          Pagar con MercadoPago <i class="fa-solid fa-credit-card" style="margin-left: 8px;"></i>
        </button>
      </div>

    </main>

    <nav class="bottom-nav" id="main-nav"></nav>
  </body>
</html>
