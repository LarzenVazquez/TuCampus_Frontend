<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuCampus - Rastrear Pedido</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/variables.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <script src="https://kit.fontawesome.com/1f47fb468a.js" crossorigin="anonymous"></script>
    <script type="module">
      import { initTheme, toggleTheme } from "/src/js/theme.js";
      window.toggleTheme = toggleTheme;
      initTheme();
    </script>
    <style>
      .tracking-step {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        opacity: 0.4;
      }
      .tracking-step.active {
        opacity: 1;
      }
      .step-icon {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: var(--text-secondary);
      }
      .tracking-step.active .step-icon {
        background: var(--accent);
        color: white;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
      }
      .step-info h3 { margin: 0; font-size: 18px; }
      .step-info p { margin: 4px 0 0 0; color: var(--text-secondary); font-size: 14px; }
    </style>
  </head>

  <body class="dark">
    <header class="store-header" id="main-header"></header>

    <main class="tc-main-layout" style="padding-top: 20px; padding-bottom: 100px;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 class="section-title" style="margin: 0;">Orden ORD-402</h2>
        <button class="tc-btn-theme" style="width: auto; margin-top: 0; padding: 8px 16px;" onclick="window.toggleTheme()">
          <i class="fa-solid fa-moon"></i> Tema
        </button>
      </div>

      <div class="tc-card" style="max-width: 100%; margin-bottom: 30px;">
        
        <div class="tracking-step active">
          <div class="step-icon"><i class="fa-solid fa-receipt"></i></div>
          <div class="step-info">
            <h3>Pago Confirmado</h3>
            <p>10:30 AM - Tu pago fue aprobado.</p>
          </div>
        </div>

        <div class="tracking-step active">
          <div class="step-icon"><i class="fa-solid fa-fire-burner"></i></div>
          <div class="step-info">
            <h3>En Preparación</h3>
            <p>10:32 AM - La cocina ya tiene tu orden.</p>
          </div>
        </div>

        <div class="tracking-step active" style="transform: scale(1.05); transform-origin: left;">
          <div class="step-icon" style="background: var(--success);"><i class="fa-solid fa-bell"></i></div>
          <div class="step-info">
            <h3 style="color: var(--success);">¡Orden Lista!</h3>
            <p style="color: var(--text-primary); font-weight: bold;">Ya puedes pasar a la barra a recoger.</p>
          </div>
        </div>

        <div class="tracking-step">
          <div class="step-icon"><i class="fa-solid fa-check-double"></i></div>
          <div class="step-info">
            <h3>Entregada</h3>
            <p>Esperando confirmación de entrega.</p>
          </div>
        </div>

      </div>

    </main>
    <nav class="bottom-nav" id="main-nav"></nav>
  </body>
</html>
